<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Robot Upload Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fa;
        color: #172033;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 24px;
        border-bottom: 1px solid #dce2ea;
        background: #ffffff;
        position: sticky;
        top: 0;
        z-index: 2;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 760;
      }
      button,
      select {
        height: 36px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #ffffff;
        padding: 0 12px;
        font: inherit;
      }
      button {
        cursor: pointer;
        background: #1f5eff;
        border-color: #1f5eff;
        color: #ffffff;
        font-weight: 650;
      }
      main {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 18px;
        padding: 18px;
      }
      section,
      aside {
        min-width: 0;
      }
      .panel {
        background: #ffffff;
        border: 1px solid #dce2ea;
        border-radius: 8px;
        padding: 16px;
      }
      .panel + .panel {
        margin-top: 18px;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 14px;
        color: #526078;
        text-transform: uppercase;
      }
      .robot-list {
        display: grid;
        gap: 8px;
      }
      .robot-row {
        display: grid;
        gap: 4px;
        padding: 10px;
        border: 1px solid #e3e8ef;
        border-radius: 6px;
        cursor: pointer;
      }
      .robot-row.active {
        border-color: #1f5eff;
        background: #eef4ff;
      }
      .row-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-weight: 700;
      }
      .muted {
        color: #65738a;
        font-size: 13px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .metric {
        border: 1px solid #e3e8ef;
        border-radius: 6px;
        padding: 12px;
      }
      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 24px;
      }
      .media-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 14px;
      }
      .media-box {
        min-height: 260px;
        border: 1px solid #e3e8ef;
        border-radius: 8px;
        overflow: hidden;
        background: #f8fafc;
      }
      .media-box h3 {
        margin: 0;
        padding: 10px 12px;
        border-bottom: 1px solid #e3e8ef;
        font-size: 14px;
      }
      .media-box img {
        display: block;
        width: 100%;
        height: 260px;
        object-fit: contain;
        background: #ffffff;
      }
      .summary,
      pre {
        overflow: auto;
        margin: 0;
        padding: 12px;
        font-size: 13px;
        line-height: 1.5;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th,
      td {
        padding: 9px 8px;
        border-bottom: 1px solid #e3e8ef;
        text-align: left;
        vertical-align: top;
      }
      @media (max-width: 900px) {
        main,
        .media-grid,
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Robot Upload Dashboard</h1>
      <div>
        <select id="robotSelect" aria-label="robot select"></select>
        <button id="refreshButton" type="button">Refresh</button>
      </div>
    </header>
    <main>
      <aside>
        <div class="panel">
          <h2>Robots</h2>
          <div id="robotList" class="robot-list"></div>
        </div>
        <div class="panel">
          <h2>Stats</h2>
          <div id="stats" class="grid"></div>
        </div>
      </aside>
      <section>
        <div class="panel">
          <h2>Latest Uploads</h2>
          <div class="media-grid">
            <div class="media-box">
              <h3>Camera Image</h3>
              <div id="imageView" class="summary muted">No image uploaded</div>
            </div>
            <div class="media-box">
              <h3>Lidar Preview</h3>
              <div id="lidarView" class="summary muted">No lidar uploaded</div>
            </div>
          </div>
        </div>
        <div class="panel">
          <h2>Selected Robot</h2>
          <pre id="robotJson">{}</pre>
        </div>
        <div class="panel">
          <h2>Events</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Robot</th>
                <th>Type</th>
                <th>Severity</th>
                <th>Resolved</th>
                <th>Summary</th>
              </tr>
            </thead>
            <tbody id="eventRows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script>
      const robotList = document.querySelector("#robotList");
      const robotSelect = document.querySelector("#robotSelect");
      const stats = document.querySelector("#stats");
      const imageView = document.querySelector("#imageView");
      const lidarView = document.querySelector("#lidarView");
      const robotJson = document.querySelector("#robotJson");
      const eventRows = document.querySelector("#eventRows");
      const refreshButton = document.querySelector("#refreshButton");
      let selectedRobotId = null;

      function formatValue(value) {
        return value === undefined || value === null || value === "" ? "-" : value;
      }

      function renderStats(payload) {
        stats.innerHTML = Object.entries(payload.stats || {})
          .map(([label, value]) => `<div class="metric"><span class="muted">${label}</span><strong>${value}</strong></div>`)
          .join("");
      }

      function renderRobotList(robots) {
        robotSelect.innerHTML = robots
          .map((robot) => `<option value="${robot.robotId}">${robot.robotId}</option>`)
          .join("");
        robotList.innerHTML = robots
          .map(
            (robot) => `
              <div class="robot-row ${robot.robotId === selectedRobotId ? "active" : ""}" data-robot-id="${robot.robotId}">
                <div class="row-title"><span>${robot.robotId}</span><span>${formatValue(robot.status)}</span></div>
                <div class="muted">battery ${formatValue(robot.battery)} / ${formatValue(robot.address)}</div>
              </div>
            `,
          )
          .join("");
      }

      function renderMedia(robot) {
        if (robot?.latestImage?.imageUrl) {
          imageView.innerHTML = `<img src="${robot.latestImage.imageUrl}" alt="latest camera upload" />`;
        } else {
          imageView.textContent = "No image uploaded";
          imageView.className = "summary muted";
        }
        if (robot?.latestLidar?.previewImageUrl) {
          lidarView.innerHTML = `<img src="${robot.latestLidar.previewImageUrl}" alt="latest lidar preview" />
            <pre>${JSON.stringify(robot.latestLidar.summary, null, 2)}</pre>`;
        } else {
          lidarView.textContent = "No lidar uploaded";
          lidarView.className = "summary muted";
        }
      }

      async function renderEvents() {
        const response = await fetch("/api/events?limit=20");
        const events = await response.json();
        eventRows.innerHTML =
          events
            .map(
              (event) => `
                <tr>
                  <td>${event.eventId}</td>
                  <td>${event.robotId}</td>
                  <td>${event.eventType}</td>
                  <td>${event.severity}</td>
                  <td>${event.resolved ? "true" : "false"}</td>
                  <td>${event.summary}</td>
                </tr>
              `,
            )
            .join("") || `<tr><td colspan="6" class="muted">No events</td></tr>`;
      }

      async function loadDashboard() {
        const query = selectedRobotId ? `?selectedRobotId=${encodeURIComponent(selectedRobotId)}` : "";
        const response = await fetch(`/api/dashboard${query}`);
        const payload = await response.json();
        selectedRobotId = payload.selectedRobotId;
        const robots = payload.robots || [];
        const selectedRobot = robots.find((robot) => robot.robotId === selectedRobotId) || robots[0] || null;
        if (selectedRobot) selectedRobotId = selectedRobot.robotId;
        renderStats(payload);
        renderRobotList(robots);
        robotSelect.value = selectedRobotId || "";
        renderMedia(selectedRobot);
        robotJson.textContent = JSON.stringify(selectedRobot || {}, null, 2);
        await renderEvents();
      }

      robotList.addEventListener("click", (event) => {
        const row = event.target.closest("[data-robot-id]");
        if (!row) return;
        selectedRobotId = row.dataset.robotId;
        loadDashboard();
      });
      robotSelect.addEventListener("change", () => {
        selectedRobotId = robotSelect.value;
        loadDashboard();
      });
      refreshButton.addEventListener("click", loadDashboard);
      loadDashboard();
    </script>
  </body>
</html>
